<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindQuest Hub</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="main">

    <!-- ===== HEADER ===== -->
    <header class="header">
        <a href="#" class="logo">MindQuest</a>

        <nav class="navbar">
            <a href="#" class="active">Home</a>
        </nav>

        <!-- 🌙 THEME TOGGLE -->
        <button id="theme-toggle">🌙</button>
    </header>


    <!-- ===== MAIN CONTAINER ===== -->
    <div class="container">

        <!-- ===== QUIZ SECTION ===== -->
        <section class="quiz-section">

            <!-- Quiz Box (dynamic content will be injected here) -->
            <div class="quiz-box"></div>

            <!-- RESULT BOX -->
            <div class="result-box">
                <h2>Quiz Result!</h2>

                <div class="percentage-container">
                    <div class="circular-progress">
                        <span class="progress-value">0%</span>
                    </div>

                    <span class="score-text"></span>
                </div>

                <div class="buttons">
                    <button class="tryAgain-btn">Try Again</button>
                    <button class="goHome-btn">Go Home</button>
                </div>
            </div>

        </section>


        <!-- ===== HOME SECTION ===== -->
        <section class="home">
            <div class="home-content">

                <h1>MindQuest Hub</h1>

                <p>
                    Challenge your mind, test your knowledge,
                    and grow every day. Ready to begin?
                </p>

                <!-- 🎯 CATEGORY + DIFFICULTY -->
                <div style="margin-bottom:20px;">
                    <select id="category">
                        <option value="18">Programming</option>
                        <option value="9">General Knowledge</option>
                        <option value="21">Sports</option>
                    </select>

                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <button class="start-btn">Start Quiz</button>

            </div>
        </section>

    </div>
</main>


<!-- ===== POPUP INFO ===== -->
<div class="popup-info">

    <h2>Quiz Guide</h2>

    <span class="info">1. Click Start to begin</span>
    <span class="info">2. Select correct answers</span>
    <span class="info">3. Timer will auto move questions</span>
    <span class="info">4. Try to score maximum!</span>

    <div class="btn-group">
        <button class="info-btn exit-btn">Exit</button>
        <button class="info-btn continue-btn">Continue</button>
    </div>

</div>


<!-- ===== JS ===== -->
<script src="script.js"></script>

</body>
</html>
